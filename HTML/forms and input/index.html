<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>

<body>

    <h1>Form to apply for the scholarship</h1>

    <form method="post">
        <div>
            <label for="name">Name:</label>
            <input type="text" name="name" placeholder="Name" autofocus>
        </div>
        <div>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
        </div>
        <div>
            <input type="checkbox" id="agree" name="tnc">
            <label for="agree">I agree to the terms and conditions</label>
        </div>
        <div>
            <label for="recheck">Enter the question no to be recheck</label>
            <textarea name="recheck" id="questionno" placeholder="Enter the comment"></textarea>
        </div>
        <div>
            <label for="fruits">Choose the fruit</label>
            <select name="fruits" id="apple">
                <option value="apple" >apple</option>
                <option value="banana">pineapple</option>
                <option value="pineapple">pineapple</option>
                <option value="apple">apple</option>
            </select>

            <!-- <select name="fruits" id="banana">banana</select>
            <select name="fruits" id="cherry">cherry</select>
            <select name="fruits" id="pineapple">pineapple</select> -->
        </div>

    </form>

</body>

</html>
